<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build Naija</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              shell: "#050505",
              line: "#46443f",
              cream: "#f4ead8",
              card: "#2f2e2a",
              green: "#5d9813",
              red: "#d43b30",
              amber: "#be7c1d",
              teal: "#12806d"
            },
            fontFamily: {
              display: ["Cormorant Garamond", "serif"],
              body: ["Manrope", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      :root {
        --city-accent: #5d9813;
        --city-soft: #dfe8c6;
        --city-event: #f2e3c9;
        --city-event-border: #d89b27;
        --city-event-text: #8e5611;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at top left, color-mix(in srgb, var(--city-accent) 18%, transparent), transparent 30%);
        opacity: 0.75;
        z-index: 0;
      }

      @keyframes screen-flash {
        0% { opacity: 0; }
        18% { opacity: 0.72; }
        100% { opacity: 0; }
      }

      @keyframes banner-pop {
        0% { transform: translateY(10px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .screen-flash {
        animation: screen-flash 850ms ease-out;
      }

      .banner-pop {
        animation: banner-pop 380ms ease-out;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-shell font-body text-cream antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
